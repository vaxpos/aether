#---------------------------------------------------------------------------------------------------------------------------
#exec
#---------------------------------------------------------------------------------------------------------------------------
exec=killall panel 2>/dev/null || true && panel & disown
exec-once=~/vaxp/aether/autostart.sh
exec-once=run-wlsunset.sh init
exec-once=init-screen-scale
exec-once=init-lockscreen
exec-once=udiskie --automount --notify
exec-once=desktop
exec-once=nm-applet
exec-once=osd-notify
exec-once=AetherDock
exec-once=auth
exec-once=aetheridle before-sleep aetherlock

#---------------------------------------------------------------------------------------------------------------------------
#keybindings
#---------------------------------------------------------------------------------------------------------------------------

 # Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none
# keyboard
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=us,ara
xkb_rules_options=grp:win_space_toggle


# الانتقال للأمام عند ضغط Alt+Tab
bind=SUPER,Tab,switcher_forward

# الانتقال للخلف عند ضغط Alt+Shift+Tab
bind=SUPER+SHIFT,Tab,switcher_backward

# إلغاء التبديل عند ضغط Escape أثناء تفعيل المبدل
keymode=default
bind=ALT,Escape,switcher_cancel_bind


# reload config
bind=SUPER,r,reload_config
bind=SUPER+SHIFT,f,toggle_floating_compositor_mode

bind=SUPER,p,spawn,grim -g "$(slurp)" shot.png


bind=SUPER,Return,spawn,ghostty
bind=SUPER,l,spawn,thunar
bind=none,XF86AudioRaiseVolume,spawn,wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bind=none,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind=none,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=none,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind=none,XF86MonBrightnessUp,spawn,mangowm-brightness +
bind=none,XF86MonBrightnessDown,spawn,mangowm-brightness -

# exit
bind=SUPER+SHIFT,q,quit
bind=SUPER,q,killclient,

# misc

# monitor switch
bind=SUPER,bracketleft,focusmon,left
bind=SUPER,bracketright,focusmon,right

# switch window focus
# bind=SUPER,Tab,focusstack,next
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# switch window status
bind=SUPER,g,toggleglobal,
bind=SUPER,e,toggleoverview,
bind=SUPER,t,togglefloating,
bind=ALT,a,togglemaximizescreen,
bind=ALT,f,togglefullscreen,
# bind=ALT+SHIFT,f,togglefakefullscreen,
bind=SUPER,o,toggleoverlay,


# scratchpad, use super+t to restore it
bind=SUPER,i,minimized,
bind=SUPER+SHIFT,I,restore_minimized
bind=SUPER,s,toggle_scratchpad

# scroller layout
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset,
#bind=SUPER,s,setlayout,scroller

# switch layout
bind=SUPER,n,switch_layout
bind=SUPER,comma,setlayout,tile
bind=SUPER,period,setlayout,tgmix
bind=SUPER,slash,setlayout,scroller

# tag switch
bind=ALT,Left,viewtoleft,0
bind=ALT,Right,viewtoright,0
bind=CTRL+SUPER,Left,tagtoleft,0
bind=CTRL+SUPER,Right,tagtoright,0

bind=Ctrl,1,view,1,0
bind=Ctrl,2,view,2,0
bind=Ctrl,3,view,3,0
bind=Ctrl,4,view,4,0
bind=Ctrl,5,view,5,0
bind=Ctrl,6,view,6,0
bind=Ctrl,7,view,7,0
bind=Ctrl,8,view,8,0
bind=Ctrl,9,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
bind=Alt,1,tagsilent,1,0
bind=Alt,2,tagsilent,2,0
bind=Alt,3,tagsilent,3,0
bind=Alt,4,tagsilent,4,0
bind=Alt,5,tagsilent,5,0
bind=Alt,6,tagsilent,6,0
bind=Alt,7,tagsilent,7,0
bind=Alt,8,tagsilent,8,0
bind=Alt,9,tagsilent,9,0

# move window to another monitor shift
# bind=ALT+SHIFT,Left,tagmon,left
# bind=ALT+SHIFT,Right,tagmon,right

# move all/single windows to another monitor
bind=ALT+SHIFT,m,spawn,~/.local/bin/aetherwm-move-all-windows
bind=ALT+SHIFT,s,spawn,~/.local/bin/aetherwm-move-all-windows single

# gaps
# bind=ALT+SHIFT,X,incgaps,1
# bind=ALT+SHIFT,Z,incgaps,-1
# bind=ALT+SHIFT,R,togglegaps

# movewin
# bind=SUPER+SHIFT,Up,movewin,+0,-50
# bind=SUPER+SHIFT,Down,movewin,+0,+50
# bind=SUPER+SHIFT,Left,movewin,-50,+0
# bind=SUPER+SHIFT,Right,movewin,+50,+0

# resizewin
bind=SUPER+ALT,Up,resizewin,+0,-50
bind=SUPER+ALT,Down,resizewin,+0,+50
bind=SUPER+ALT,Left,resizewin,-50,+0
bind=SUPER+ALT,Right,resizewin,+50,+0

# Mouse Button Bindings
# NONE mode key only work in ov mode
mousebind=SUPER,btn_left,moveresize,curmove
# mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=NONE,btn_left,toggleoverview,1
mousebind=NONE,btn_right,killclient,0

# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

#---------------------------------------------------------------------------------------------------------------------------
#---------------------------------------------------------------------------------------------------------------------------
# envconfig
#---------------------------------------------------------------------------------------------------------------------------
# misc env
env=XCURSOR_SIZE,24
env=XCURSOR_THEME,Sunity-cursors
env=GTK_THEME,WhiteSur-Dark
env=QT_STYLE_OVERRIDE,gtk3

# fcitx5 im
# env=GTK_IM_MODULE,fcitx
env=QT_IM_MODULE,fcitx
env=XMODIFIERS,@im=fcitx
env=INPUT_METHOD,fcitx
env=SDL_IM_MODULE,fcitx
env=GLFW_IM_MODULE,fcitx

# scale factor about qt (herr is 1.4)
env=QT_QPA_PLATFORMTHEME,gtk3
env=QT_AUTO_SCREEN_SCALE_FACTOR,1.25
env=QT_QPA_PLATFORM,Wayland;xcb
env=QT_WAYLAND_FORCE_DPI,140

#---------------------------------------------------------------------------------------------------------------------------
#rules
#---------------------------------------------------------------------------------------------------------------------------
# you can use mmsg -g to see all windows opened
# you can use mmsg -e to get the last open layer name
###
# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile


layerrule=animation_type_open:zoom,layer_name:vater
layerrule=animation_type_close:fade,layer_name:vater
layerrule=blur_optimized:0,layer_name:aether-launcher

# no blur slurp select layer
windowrule=blur:1,unfocused_opacity:1,focused_opacity:0.95,appid:com.mitchellh.ghostty

windowrule=isoverlay:1,isfloating:1,appid:Thunar,title:.*Rename.*
windowrule=isoverlay:1,isfloating:1,appid:Thunar,title:.*Properties.*
windowrule=isoverlay:1,isfloating:1,appid:Thunar,title:.*Preferences.*
windowrule=isoverlay:1,isfloating:1,appid:Thunar,title:.*Custom.*
windowrule=isoverlay:1,isfloating:1,appid:Thunar,title:.*Configure.*

layerrule=noblur:1,layer_name:selection

# layerrule=noblur:0,layer_name:rofi

windowrule=isfloating:1,isoverlay:1,appid:mpv

windowrule=isfloating:1,isoverlay:1,appid:thunar

windowrule=blur:1,unfocused_opacity:1,focused_opacity:0.95,appid:com.mitchellh.ghostty

windowrule=isoverlay:1,isfloating:1,appid:Thunar,title:.*Rename.*
windowrule=isoverlay:1,isfloating:1,appid:Thunar,title:.*Properties.*
windowrule=isoverlay:1,isfloating:1,appid:Thunar,title:.*Preferences.*
windowrule=isoverlay:1,isfloating:1,appid:Thunar,title:.*Custom.*
windowrule=isoverlay:1,isfloating:1,appid:Thunar,title:.*Configure.*
#---------------------------------------------------------------------------------------------------------------------------
#---------------------------------------------------------------------------------------------------------------------------

shadows = 0
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor= 0x000000ff
enable_edge_snap = 1
edge_snap_threshold = 20
edge_snap_corner_size = 80
edge_snap_preview_alpha = 0.45
edge_snap_preview_color = 0x000000ff

border_radius=14
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 0-horizontal,1-vertical
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=fade
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.3
zoom_end_ratio=0.6
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=200
animation_duration_open=300
animation_duration_tag=350
animation_duration_close=300
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=1
default_nmaster=1
smartgaps=0
## default size of new window
default_mfact=0.5


# Overview Setting
hotarea_size=10
enable_hotarea=1
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
inhibit_regardless_of_visibility=0
sloppyfocus=0
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
gappih=15
gappiv=15
gappoh=10
gappov=5
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=1
rootcolor=0x201b14ff
bordercolor=0x444444ff
focuscolor=0xc9b890ff
maximizescreencolor=0x89aa61ff
urgentcolor=0xad401fff
scratchpadcolor=0x516c93ff
globalcolor=0xb153a7ff
overlaycolor=0x14a57cff


# blur settings
blur = 1
blur_layer = 1
blur_params_num_passes = 2
#stringth
blur_params_radius = 3
blur_params_noise = 0
blur_params_brightness = 1
blur_params_contrast = 1
blur_params_saturation = 1
# this cache's the blurred background onto the layer's background
# windows beneath the layer will not show since it's a static background when enabled
blur_optimized=0

